apiVersion: v1
kind: ConfigMap
metadata:
  name: gc-config
  labels: {{- include "gc.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  API_V1_PREFIX: {{ .Values.config.apiPrefix | quote }}
  BACKEND_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  POSTGRES_HOST: "gc-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "goldenconfig"
  REDIS_HOST: "gc-redis"
  REDIS_PORT: "6379"
  CELERY_BROKER_URL: "redis://gc-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://gc-redis:6379/1"
  CACHE_REDIS_URL: "redis://gc-redis:6379/2"
  OTEL_ENABLED: {{ .Values.config.otelEnabled | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gc-secrets
  labels: {{- include "gc.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  CREDENTIAL_ENCRYPTION_KEY: {{ .Values.secrets.credentialEncryptionKey | quote }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  FIRST_ADMIN_USERNAME: {{ .Values.secrets.firstAdminUsername | quote }}
  FIRST_ADMIN_EMAIL: {{ .Values.secrets.firstAdminEmail | quote }}
  FIRST_ADMIN_PASSWORD: {{ .Values.secrets.firstAdminPassword | quote }}

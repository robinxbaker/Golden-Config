apiVersion: apps/v1
kind: Deployment
metadata:
  name: gc-backend
  labels: {{- include "gc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: gc-backend
  template:
    metadata:
      labels:
        app: gc-backend
    spec:
      containers:
        - name: backend
          image: {{ include "gc.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - "alembic upgrade head && python -m app.initial_data && uvicorn app.main:app --host 0.0.0.0 --port 8000"
          envFrom:
            - configMapRef:
                name: gc-config
            - secretRef:
                name: gc-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /api/v1/ready, port: 8000 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 15
          resources: {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gc-backend
  labels: {{- include "gc.labels" . | nindent 4 }}
spec:
  selector:
    app: gc-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gc-worker
  labels: {{- include "gc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: gc-worker
  template:
    metadata:
      labels:
        app: gc-worker
    spec:
      containers:
        - name: worker
          image: {{ include "gc.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: gc-config
            - secretRef:
                name: gc-secrets

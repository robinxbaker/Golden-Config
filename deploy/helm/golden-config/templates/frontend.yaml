apiVersion: apps/v1
kind: Deployment
metadata:
  name: gc-frontend
  labels: {{- include "gc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: gc-frontend
  template:
    metadata:
      labels:
        app: gc-frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "gc.frontendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gc-frontend
  labels: {{- include "gc.labels" . | nindent 4 }}
spec:
  selector:
    app: gc-frontend
  ports:
    - port: 80
      targetPort: 80
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gc-ingress
  labels: {{- include "gc.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gc-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gc-frontend
                port:
                  number: 80
{{- end }}

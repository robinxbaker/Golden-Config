apiVersion: apps/v1
kind: Deployment
metadata:
  name: gc-backend
  namespace: golden-config
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gc-backend
  template:
    metadata:
      labels:
        app: gc-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/golden-config-backend:latest
          command:
            - sh
            - -c
            - "alembic upgrade head && python -m app.initial_data && uvicorn app.main:app --host 0.0.0.0 --port 8000"
          envFrom:
            - configMapRef:
                name: gc-config
            - secretRef:
                name: gc-secrets
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gc-backend
  namespace: golden-config
spec:
  selector:
    app: gc-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gc-worker
  namespace: golden-config
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gc-worker
  template:
    metadata:
      labels:
        app: gc-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/golden-config-backend:latest
          command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: gc-config
            - secretRef:
                name: gc-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

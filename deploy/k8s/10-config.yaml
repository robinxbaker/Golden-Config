apiVersion: v1
kind: ConfigMap
metadata:
  name: gc-config
  namespace: golden-config
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  API_V1_PREFIX: "/api/v1"
  BACKEND_CORS_ORIGINS: "https://goldenconfig.example.com"
  POSTGRES_HOST: "gc-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "goldenconfig"
  REDIS_HOST: "gc-redis"
  REDIS_PORT: "6379"
  CELERY_BROKER_URL: "redis://gc-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://gc-redis:6379/1"
  CACHE_REDIS_URL: "redis://gc-redis:6379/2"
  OTEL_ENABLED: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: gc-secrets
  namespace: golden-config
type: Opaque
stringData:
  # Replace these before deploying to a real cluster.
  SECRET_KEY: "replace-with-long-random-string"
  CREDENTIAL_ENCRYPTION_KEY: "replace-with-fernet-key"
  POSTGRES_USER: "goldenconfig"
  POSTGRES_PASSWORD: "replace-me"
  FIRST_ADMIN_USERNAME: "admin"
  FIRST_ADMIN_EMAIL: "admin@goldenconfig.example.com"
  FIRST_ADMIN_PASSWORD: "replace-me"
